
<!-- This is a html code for a basic login page -->

<!DOCTYPE html>
<html>

<head>
  <title>Login Page</title>
  <link rel="stylesheet" href="login.css">

</head>

<body>
  <div class="container">
    <p id="p1">Hello! please sign in here.</p>
    <form id="login-form">
      <label for="usernameee">Username:</label><br>
      <input type="text" id="usernameee" placeholder="Username" class="textbox" required>
      <label for="passworddd">Password:</label><br>
      <input type="password" id="passworddd" placeholder="Password" class="textbox" required>

      <div id="buttonsdiv">
        <button type="submit" id="login">Login</button>
        <button type="button" id="signup">Sign up</button>
      </div>
    </form>

    <a href="forgot.html" id="link" target="_blank">Forgot your password?</a>

  </div>





  <script src="login.js"></script>

</body>

</html>
